---
apiVersion: v1
kind: Namespace
metadata:
  name: bbcnews-ns

---
apiVersion: v1
kind: Pod
metadata:
  name: bbc
  labels:
    app: bbc
spec:
  containers:
    - name: bbccontainer
      image: dockerharikrishnan/bbcnews
      ports:
        - containerPort: 80
        
---
apiVersion: v1
kind: Service
metadata:
  name: bbcnews
spec:
  selector:
    app: bbc
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
